name: HDC ci/cd pipeline filecopy

permissions:
  contents: write
  issues: write
  pull-requests: write

on:
  push:
    branches:
      - main
    paths:
      - 'filecopy/**'
  pull_request:
    branches:
      - main
    paths:
      - 'filecopy/**'

jobs:
  run_tests_hdc:
    uses: PilotDataPlatform/pilot-hdc-ci-tools/.github/workflows/run_tests.yml@main
    with:
      python_version: '3.10.14'
      poetry_directory: 'filecopy'
      pytest_directory: 'filecopy'
      coverage_target: 'operations'
      min_coverage_percent: 47
    secrets: inherit

  build_and_publish_hdc:
    needs: [run_tests_hdc]
    uses: PilotDataPlatform/pilot-hdc-ci-tools/.github/workflows/build_and_publish.yml@main
    with:
      matrix_config: '["filecopy"]'
      service_name: 'filecopy'
      path_to_dockerfile: 'filecopy/Dockerfile'
      docker_build_context: './filecopy'
      path_to_pyproject: 'filecopy/pyproject.toml'
      registry_subpath: 'pipelines'
    secrets: inherit

  update_gitops_hdc:
    needs: [build_and_publish_hdc]
    if: github.event_name != 'pull_request'
    uses: PilotDataPlatform/pilot-hdc-ci-tools/.github/workflows/update_gitops_versions.yml@main
    with:
      service_key: filecopy
      image_tag: "n47w5524.c1.de1.container-registry.ovh.net/hdc-services-image/pipelines/filecopy:filecopy-${{ needs.build_and_publish_hdc.outputs.app_version }}"
      versions_file: clusters/dev/apps/queue-consumer/values.yaml
      yaml_path: '.queue-service.extraEnv.data_transfer_image'
    secrets: inherit
